<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1a0a2e"/>
  <rect x="2" y="2" width="28" height="28" rx="4" fill="none" stroke="#ff00ff" stroke-width="1.5" opacity="0.3"/>
  <text x="16" y="22" font-family="monospace" font-size="18" font-weight="bold" fill="#ff00ff" text-anchor="middle" filter="url(#glow)">A</text>
  <defs>
    <filter id="glow">
