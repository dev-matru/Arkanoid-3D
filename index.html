<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/font.css">
  <link rel="stylesheet" href="css/space.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="alternate icon" href="assets/favicon.svg">
</head>


<body>

  <div id="mySidenav" class="sidenav">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    
    <div class="settings-section">
      <h3 class="settings-title">&#9733; Difficulty</h3>
      <div class="settings-divider"></div>
      <form class="difficulty-form">
        <label class="radio-label">
          <input type="radio" name="difficulty" onchange="setDifficulty(this.value);" value="easy" checked>
          <span class="radio-custom"></span>
          <span class="radio-text easy">Easy</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="difficulty" onchange="setDifficulty(this.value);" value="medium">
          <span class="radio-custom"></span>
          <span class="radio-text medium">Medium</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="difficulty" onchange="setDifficulty(this.value);" value="hard">
          <span class="radio-custom"></span>
          <span class="radio-text hard">Hard</span>
        </label>
      </form>
    </div>

    <div class="settings-section">
      <h3 class="settings-title">&#9733; Blocks</h3>
      <div class="settings-divider"></div>
      <div class="select-group">
        <div class="select-field">
          <label class="select-label" for="rowsSelect">Rows</label>
          <select name="rows" id="rowsSelect" onchange="setRowsNumber(this.value)">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5" selected>5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
          </select>
        </div>
        <div class="select-field">
          <label class="select-label" for="columnsSelect">Columns</label>
          <select name="columns" id="columnsSelect" onchange="setColumnsNumber(this.value)">
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8" selected>8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </div>
      </div>
    </div>
  </div> 
  
  <div>
    <div id="stars"></div>
    <div id="stars2"></div>
    <div id="stars3"></div>
  </div> 

  <div id="mainArea">
  
    <img class="logo" src="assets/logo.png">
    
    <div class="button" onclick="playGame();">
      <img src="assets/play.svg">
      <h1>PLAY GAME</h1>
    </div>

    <div class="button" onclick="openNav();">
      <img src="assets/settings.svg">
      <h1>SETTINGS</h1>
    </div>

    <div id="fullscreenBtn" class="fullscreen-toggle" onclick="toggleFullscreen();" title="Toggle Fullscreen">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,0,255,0.6)" stroke-width="2">
        <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
        <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
        <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
        <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
    </div>

  </div>

  <canvas id="scene"></canvas>

  <div id="score">SCORE: 0</div>
  <div id="result"></div>
  <div id="legend">

    <h3 class='legendText'>PADDLE MOVEMENT:</h3>
    <img class="legendLogo" src="assets/mouse.png"></br>

    <h3 class='legendText'>CAMERA VIEW:</h3>
    <div id="cameraPreset" style="color:#ff00ff; font-size:14px; letter-spacing:2px;">[1] Orbit</div>
    <div style="color:rgba(255,0,255,0.5); font-size:11px; margin-top:4px;">Keys 1-5 to change</div>
  </div>

</body>

<script type="text/javascript" src="js/app.js"></script>
<script type="text/javascript" src="js/config.js"></script>
<script type="text/javascript" src="js/twgl.js"></script>

<script type="text/javascript" src="js/core/math.js"></script>
<script type="text/javascript" src="js/core/shaders.js"></script>
<script type="text/javascript" src="js/core/texture.js"></script>
<script type="text/javascript" src="js/core/geometry.js"></script>
<script type="text/javascript" src="js/core/coordinates.js"></script>
<script type="text/javascript" src="js/core/storage.js"></script>

<script type="text/javascript" src="js/game/colors.js"></script>
<script type="text/javascript" src="js/game/arena.js"></script>
<script type="text/javascript" src="js/game/physics.js"></script>
<script type="text/javascript" src="js/game/state.js"></script>
<script type="text/javascript" src="js/game/input.js"></script>

<script type="text/javascript" src="js/render/camera.js"></script>
<script type="text/javascript" src="js/render/renderer.js"></script>

<script type="text/javascript" src="js/ui/menu.js"></script>

<script>
window.onload = function() {
  APP.ui.init();
};

function toggleFullscreen() {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    var el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}
</script>
