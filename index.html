<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/font.css">
  <link rel="stylesheet" href="css/space.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="alternate icon" href="assets/icons/favicon.svg">
</head>


<body>

  <div id="mySidenav" class="sidenav">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    
    <div class="settings-section">
      <div class="settings-head">
        <h3 class="settings-title">Difficulty</h3>
        <span id="difficultyStatus" class="difficulty-status">Runner</span>
      </div>
      <div class="settings-divider"></div>
      <form class="difficulty-form">
        <label class="radio-label" data-difficulty-option="rookie">
          <input type="radio" name="difficulty" onchange="setDifficulty(this.value);" value="rookie">
          <span class="radio-custom"></span>
          <span class="radio-text rookie">Rookie</span>
        </label>
        <label class="radio-label" data-difficulty-option="runner">
          <input type="radio" name="difficulty" onchange="setDifficulty(this.value);" value="runner" checked>
          <span class="radio-custom"></span>
          <span class="radio-text runner">Runner</span>
        </label>
        <label class="radio-label" data-difficulty-option="hacker">
          <input type="radio" name="difficulty" onchange="setDifficulty(this.value);" value="hacker">
          <span class="radio-custom"></span>
          <span class="radio-text hacker">Hacker</span>
        </label>
        <label class="radio-label" data-difficulty-option="glitch">
          <input type="radio" name="difficulty" onchange="setDifficulty(this.value);" value="glitch">
          <span class="radio-custom"></span>
          <span class="radio-text glitch">Glitch</span>
        </label>
        <label class="radio-label" data-difficulty-option="overdrive">
          <input type="radio" name="difficulty" onchange="setDifficulty(this.value);" value="overdrive">
          <span class="radio-custom"></span>
          <span class="radio-text overdrive">Overdrive</span>
        </label>
        <label class="radio-label" data-difficulty-option="blackout">
          <input type="radio" name="difficulty" onchange="setDifficulty(this.value);" value="blackout">
          <span class="radio-custom"></span>
          <span class="radio-text blackout">Blackout</span>
        </label>
        <label class="radio-label" data-difficulty-option="singularity">
          <input type="radio" name="difficulty" onchange="setDifficulty(this.value);" value="singularity">
          <span class="radio-custom"></span>
          <span class="radio-text singularity">Singularity</span>
        </label>
      </form>
    </div>

    <div class="settings-section audio-section">
      <div class="settings-head">
        <h3 class="settings-title">Audio</h3>
        <span class="difficulty-status">Mix</span>
      </div>
      <div class="settings-divider"></div>
      <label class="audio-toggle">
        <span class="audio-toggle-copy">
          <span class="audio-toggle-title">Music</span>
          <span class="audio-toggle-subtitle">Background track</span>
        </span>
        <input id="musicEnabledInput" type="checkbox" checked onchange="setAudioSetting('musicEnabled', this.checked)">
        <span class="toggle-switch"></span>
      </label>
      <div class="advanced-control audio-volume-control">
        <label class="select-label" for="musicVolumeInput">Music volume <span id="musicVolumeValue">100%</span></label>
        <input id="musicVolumeInput" type="range" min="0" max="100" step="5" value="100" oninput="setAudioSetting('musicVolume', this.value)">
      </div>
      <label class="audio-toggle">
        <span class="audio-toggle-copy">
          <span class="audio-toggle-title">Sounds</span>
          <span class="audio-toggle-subtitle">Impacts and events</span>
        </span>
        <input id="sfxEnabledInput" type="checkbox" checked onchange="setAudioSetting('sfxEnabled', this.checked)">
        <span class="toggle-switch"></span>
      </label>
      <div class="advanced-control audio-volume-control">
        <label class="select-label" for="sfxVolumeInput">Sound volume <span id="sfxVolumeValue">100%</span></label>
        <input id="sfxVolumeInput" type="range" min="0" max="100" step="5" value="100" oninput="setAudioSetting('sfxVolume', this.value)">
      </div>
    </div>

    <details class="settings-section advanced-section">
      <summary class="advanced-summary" onclick="toggleAdvancedMenu(event)">
        <span>Advanced</span>
        <span class="advanced-glyph">+</span>
      </summary>
      <div class="settings-divider"></div>
      <div class="advanced-control">
        <label class="select-label" for="ballSpeedInput">Ball speed <span id="ballSpeedValue">0.13</span></label>
        <input id="ballSpeedInput" type="range" min="0.08" max="0.34" step="0.01" value="0.13" oninput="setAdvancedSetting('ballSpeed', this.value)">
      </div>
      <div class="advanced-control">
        <label class="select-label" for="rowsInput">Rows <span id="rowsValue">5</span></label>
        <input id="rowsInput" type="range" min="3" max="12" step="1" value="5" oninput="setAdvancedSetting('rows', this.value)">
      </div>
      <div class="advanced-control">
        <label class="select-label" for="columnsInput">Columns <span id="columnsValue">8</span></label>
        <input id="columnsInput" type="range" min="6" max="14" step="1" value="8" oninput="setAdvancedSetting('columns', this.value)">
      </div>
      <div class="advanced-control">
        <label class="select-label" for="blockHeightInput">Block group height <span id="blockHeightValue">40%</span></label>
        <input id="blockHeightInput" type="range" min="0.30" max="0.72" step="0.02" value="0.40" oninput="setAdvancedSetting('blockHeight', this.value)">
      </div>
      <div class="advanced-control">
        <label class="select-label" for="paddleWidthInput">Paddle width <span id="paddleWidthValue">2.45</span></label>
        <input id="paddleWidthInput" type="range" min="1.00" max="3.20" step="0.05" value="2.45" oninput="setAdvancedSetting('paddleWidth', this.value)">
      </div>
    </details>
  </div> 
  
  <div>
    <div id="stars"></div>
    <div id="stars2"></div>
    <div id="stars3"></div>
  </div> 

  <div id="mainArea">
  
    <img class="logo" src="assets/images/logo.png">
    
    <div class="button" onclick="playGame();">
      <img src="assets/icons/play.svg">
      <h1>PLAY GAME</h1>
    </div>

    <div class="button" onclick="openNav();">
      <img src="assets/icons/settings.svg">
      <h1>SETTINGS</h1>
    </div>

  </div>

  <div id="fullscreenBtn" class="fullscreen-toggle" onclick="toggleFullscreen();" title="Toggle Fullscreen">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,0,255,0.6)" stroke-width="2">
        <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
        <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
        <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
        <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
    </div>

  <canvas id="scene"></canvas>

  <div id="score">SCORE: 0</div>
  <div id="result"></div>
  <div id="legend">
    <div class="legend-header">
      <span class="legend-kicker">Camera</span>
    </div>
    <div id="cameraLegendOptions" class="camera-options">
      <span class="camera-option active" data-camera="1"><b>1</b> Default</span>
      <span class="camera-option" data-camera="2"><b>2</b> Top</span>
      <span class="camera-option" data-camera="3"><b>3</b> Side</span>
      <span class="camera-option" data-camera="4"><b>4</b> Paddle POV</span>
      <span class="camera-option" data-camera="5"><b>5</b> Ball POV</span>
    </div>
  </div>

</body>

<script type="text/javascript" src="js/app.js"></script>
<script type="text/javascript" src="js/config.js"></script>
<script type="text/javascript" src="js/twgl.js"></script>

<script type="text/javascript" src="js/core/math.js"></script>
<script type="text/javascript" src="js/core/shaders.js"></script>
<script type="text/javascript" src="js/core/texture.js"></script>
<script type="text/javascript" src="js/core/geometry.js"></script>
<script type="text/javascript" src="js/core/coordinates.js"></script>
<script type="text/javascript" src="js/core/storage.js"></script>

<script type="text/javascript" src="js/game/colors.js"></script>
<script type="text/javascript" src="js/game/arena.js"></script>
<script type="text/javascript" src="js/game/physics.js"></script>
<script type="text/javascript" src="js/game/state.js"></script>
<script type="text/javascript" src="js/game/input.js"></script>

<script type="text/javascript" src="js/render/camera.js"></script>
<script type="text/javascript" src="js/render/renderer.js"></script>

<script type="text/javascript" src="js/ui/stars.js"></script>
<script type="text/javascript" src="js/ui/menu.js"></script>

<script>
window.onload = function() {
  APP.ui.init();
};

function toggleFullscreen() {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    var el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}
</script>
